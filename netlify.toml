[build]
  command = "npm run build"
  publish = "dist"

# Handle React SPA routing — all paths serve index.html
[[redirects]]
  from = "/polypane/*"
  to = "/polypane/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
