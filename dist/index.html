<style id="mitra-navbar-fix-css">
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&display=swap');
/* ── MitraVerse Navbar Fix v3 ── */
.mitra-wordmark-fixed {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    text-decoration: none;
    line-height: 1;
    gap: 4px;
    flex-shrink: 0;
}
.mitra-wordmark-fixed .wm-name {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1.35rem;
    letter-spacing: -0.3px;
    color: #ffffff;
    display: flex;
    align-items: baseline;
}
.mitra-wordmark-fixed .wm-bold {
    font-weight: 700;
    color: #ffffff;
}
.mitra-wordmark-fixed .wm-light {
    font-weight: 300;
    color: #ffffff;
}
.mitra-wordmark-fixed .wm-sub {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.52rem;
    font-weight: 400;
    letter-spacing: 2.5px;
    color: rgba(255, 255, 255, 0.5);
    text-transform: uppercase;
}
/* Desktop nav */
.mitra-nav-fixed {
    display: flex;
    gap: 28px;
    list-style: none;
    margin: 0;
    padding: 0;
    align-items: center;
}
.mitra-nav-fixed li a {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: rgba(255, 255, 255, 0.75) !important;
    text-decoration: none;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: color 0.25s ease;
    white-space: nowrap;
}
.mitra-nav-fixed li a:hover {
    color: #ffffff !important;
}
.mitra-nav-fixed li a.nav-cta {
    color: #ffffff !important;
    border: 1px solid rgba(255,255,255,0.35);
    padding: 6px 16px;
    border-radius: 6px;
    transition: background 0.25s ease, border-color 0.25s ease;
}
.mitra-nav-fixed li a.nav-cta:hover {
    background: rgba(255,255,255,0.1);
    border-color: rgba(255,255,255,0.7);
}
/* Hide desktop nav on mobile */
@media (max-width: 768px) {
    .mitra-nav-fixed { display: none; }
}
/* Hide duplicate wordmark inside mobile menu */
.mitra-mobile-menu .mitra-wordmark,
.mitra-mobile-menu .mitra-wordmark-fixed {
    display: none !important;
}
</style>
